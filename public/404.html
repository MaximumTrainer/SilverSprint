<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SilverSprint</title>
    <script>
      /**
       * GitHub Pages SPA routing redirect.
       *
       * GitHub Pages returns this 404.html for any path that does not correspond
       * to a physical file (e.g. /SilverSprint/callback).  We preserve the
       * original path and query string in sessionStorage and redirect to the app
       * root so the SPA can restore the URL and handle routing in JavaScript.
       *
       * On *.github.io hosts the first path segment is the GitHub Pages repository
       * name (e.g. 'SilverSprint'), so the app root is /<repo>/.
       * On custom domains (or any other host) there is no repo-name prefix, so
       * the app root is the origin root (/), avoiding an infinite 404 loop that
       * would occur if we mistakenly treated '/callback' as the repo name.
       */
      (function () {
        var loc = window.location;
        var parts = loc.pathname.split('/').filter(Boolean);
        // On *.github.io hosts, parts[0] is the GitHub Pages repo name (e.g. 'SilverSprint').
        // On custom domains or other hosts, redirect to the origin root instead.
        var isGitHubPagesHost = /\.github\.io$/i.test(loc.hostname);
        var root =
          isGitHubPagesHost && parts.length > 0
            ? loc.origin + '/' + parts[0] + '/'
            : loc.origin + '/';

        sessionStorage.setItem(
          'ss_redirect',
          JSON.stringify({
            path: loc.pathname,
            search: loc.search,
            hash: loc.hash,
          })
        );

        loc.replace(root);
      })();
    </script>
  </head>
  <body></body>
</html>
